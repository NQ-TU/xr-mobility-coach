spring.application.name=xr-mobility-coach-api

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

logging.level.org.flywaydb=DEBUG
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health

security.jwt.issuer=xr-mobility-coach
security.jwt.ttl-seconds=3600

app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-requests-per-minute=${APP_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:10}
app.rate-limit.routine-draft-requests-per-minute=${APP_RATE_LIMIT_ROUTINE_DRAFT_REQUESTS_PER_MINUTE:5}
app.rate-limit.routine-draft-requests-per-day=${APP_RATE_LIMIT_ROUTINE_DRAFT_REQUESTS_PER_DAY:40}

llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.model=${OPENAI_MODEL:gpt-4.1-mini}
llm.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
llm.openai.timeout-seconds=${OPENAI_TIMEOUT_SECONDS:30}
llm.openai.retry-attempts=${OPENAI_RETRY_ATTEMPTS:2}
llm.openai.max-history-messages=${OPENAI_MAX_HISTORY_MESSAGES:8}
llm.openai.max-output-tokens=${OPENAI_MAX_OUTPUT_TOKENS:500}
llm.openai.temperature=${OPENAI_TEMPERATURE:0.4}
