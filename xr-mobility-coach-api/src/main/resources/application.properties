spring.application.name=xr-mobility-coach-api

spring.datasource.url=jdbc:postgresql://localhost:5433/xr_mobility
spring.datasource.username=xr_user
spring.datasource.password=xr_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

logging.level.org.flywaydb=DEBUG
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health

# JWT signing secret
security.jwt.secret=${JWT_SECRET}
security.jwt.issuer=xr-mobility-coach
security.jwt.ttl-seconds=3600
