name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "xr-mobility-coach-api/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-deploy-main
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: xr-mobility-coach-api

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test
        env:
          JWT_SECRET: test-jwt-secret-for-github-actions

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsBackendDeploy

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_URI:$IMAGE_TAG \
            -t $IMAGE_URI:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest
